    資本と配当の合計で最高額を獲得
  </text>
  <circle cx="100" cy="410" r="8" fill="white" opacity="0.8"/>
  <text x="130" y="420" font-family="Arial, sans-serif" font-size="18" fill="white">
    破産してないプレイヤーのみ対象
  </text>
  <circle cx="100" cy="460" r="8" fill="white" opacity="0.8"/>
  <text x="130" y="470" font-family="Arial, sans-serif" font-size="18" fill="white">
    最も多くの資金を保有したプレイヤーが勝利
  </text>
  <circle cx="100" cy="550" r="6" fill="white" opacity="0.5"/>
  <circle cx="800" cy="550" r="6" fill="white" opacity="0.5"/>
</svg>