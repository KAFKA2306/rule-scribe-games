<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#c6910c;stop-opacity:0.85" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="600" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="900" height="8" fill="white" opacity="0.8"/>
  <rect x="30" y="30" width="840" height="540" fill="none" stroke="white" stroke-width="3" rx="12" opacity="0.9"/>
  <rect x="30" y="30" width="8" height="540" fill="white" opacity="0.7" rx="4"/>
  
  <text x="450" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="white" filter="url(#shadow)">
    🏆
  </text>
  
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white">
    勝利条件
  </text>
  
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="white" opacity="0.95">
    Winning
  </text>
  
  <line x1="80" y1="260" x2="820" y2="260" stroke="white" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="310" r="8" fill="white" opacity="0.8"/>
  <text x="130" y="320" font-family="Arial, sans-serif" font-size="18" fill="white">
